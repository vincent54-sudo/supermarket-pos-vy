<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sales History & Reports</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; background: #f0f2f5; }
        .report-container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        h1 { color: #1a73e8; display: flex; align-items: center; gap: 10px; }
        
        .summary-grid { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-box { flex: 1; padding: 20px; border-radius: 8px; color: white; text-align: center; }
        .bg-blue { background: #1a73e8; }
        .bg-green { background: #34a853; }
        .bg-orange { background: #f9ab00; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f9fa; padding: 15px; text-align: left; border-bottom: 2px solid #eee; color: #5f6368; }
        td { padding: 15px; border-bottom: 1px solid #f1f1f1; }
        .timestamp { color: #888; font-size: 0.85rem; }
        .total-amount { font-weight: bold; color: #202124; }
    </style>
</head>
<body>

<div class="report-container">
    <h1>📊 Sales Transaction Logs</h1>

    <div class="summary-grid">
        <div class="stat-box bg-blue">
            <h3 id="totalTransactions">0</h3>
            <p>Total Sales</p>
        </div>
        <div class="stat-box bg-green">
            <h3 id="totalRevenue">$0.00</h3>
            <p>Gross Income</p>
        </div>
        <div class="stat-box bg-orange">
            <h3 id="avgSale">$0.00</h3>
            <p>Avg. Transaction</p>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Date & Time</th>
                <th>Product ID</th>
                <th>Product Name</th>
                <th>Qty</th>
                <th>Total Price</th>
            </tr>
        </thead>
        <tbody id="salesLogBody">
            </tbody>
    </table>
</div>

<script>
    async function loadSalesHistory() {
        try {
            const response = await fetch("http://127.0.0.1:8000/api/sales/history");
            const sales = await response.json();
            const tbody = document.getElementById("salesLogBody");
            tbody.innerHTML = "";

            let revenue = 0;

            sales.forEach(sale => {
                revenue += sale.total;
                
                // Format the date nicely
                const date = new Date(sale.created_at).toLocaleString();

                tbody.innerHTML += `
                    <tr>
                        <td class="timestamp">${date}</td>
                        <td><code>${sale.product_id}</code></td>
                        <td>${sale.product_name}</td>
                        <td>${sale.quantity}</td>
                        <td class="total-amount">$${sale.total.toFixed(2)}</td>
                    </tr>
                `;
            });

            // Update Header Stats
            document.getElementById("totalTransactions").innerText = sales.length;
            document.getElementById("totalRevenue").innerText = `$${revenue.toFixed(2)}`;
            const avg = sales.length > 0 ? (revenue / sales.length) : 0;
            document.getElementById("avgSale").innerText = `$${avg.toFixed(2)}`;

        } catch (err) {
            console.error("Failed to load sales:", err);
        }
    }

    document.addEventListener("DOMContentLoaded", loadSalesHistory);
</script>

</body>
</html>
