<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supermarket Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f9; }
        .login-card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>System Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleLogin()">Login</button>
        <p id="msg" style="color: red; font-size: 14px;"></p>
    </div>

    <script>
        async function handleLogin() {
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;
            const msgBox = document.getElementById("msg");

            msgBox.innerText = "Connecting...";

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem("token", data.access_token);
                    // SUCCESS: Send user to the main scanner page (Root /)
                    window.location.href = "/"; 
                } else {
                    msgBox.innerText = data.detail || "Invalid credentials!";
                }
            } catch (err) {
                msgBox.innerText = "Error: Could not reach server.";
                console.error(err);
            }
        }
    </script>
</body>
</html>
