<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supermarket POS</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="navbar">
        <h1>Supermarket POS</h1>
        <nav>
            <a href="#">Home</a>
        </nav>
    </div>

    <div class="container">
        <div class="card">
            <h2>Scan Product</h2>
            <input type="text" id="itemId" placeholder="Scan barcode or enter code" autofocus>
            <input type="number" id="quantity" value="1" min="1">
            <button id="addBtn">Add to Cart</button>
        </div>

        <div class="card">
            <h2>Cart</h2>
            <table id="cartTable">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="./pos.js" type="module"></script>
</body>
</html>
